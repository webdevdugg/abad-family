<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abad Family — Photo Review</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
          background: #1a1a1a; color: #eee; min-height: 100vh; }
  header { background: #111; padding: 20px 32px; border-bottom: 1px solid #333;
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
  header h1 { font-size: 20px; font-weight: 600; }
  header p { font-size: 13px; color: #888; margin-top: 4px; }
  .progress { font-size: 14px; color: #C9A457; font-weight: 700; white-space: nowrap; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
           gap: 20px; padding: 24px 32px; }
  .card { background: #222; border-radius: 12px; overflow: hidden;
           border: 2px solid #444; transition: border-color .2s; }
  .card.reviewed { border-color: #2a7a4a; }
  .photo { position: relative; aspect-ratio: 4/3; background: #333; overflow: hidden; }
  .photo img { width: 100%; height: 100%; object-fit: cover; }
  .photo-badge { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,.75);
                  color: #7ab8d4; font-size: 11px; font-weight: 600; padding: 3px 8px;
                  border-radius: 4px; }
  .photo-num { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,.75);
                color: #888; font-size: 11px; padding: 2px 6px; border-radius: 3px; }
  .no-img { display: flex; align-items: center; justify-content: center;
             height: 100%; color: #555; font-size: 12px; flex-direction: column; gap: 8px; }
  .form { padding: 14px; display: flex; flex-direction: column; gap: 10px; }
  label { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: #888; display: block; }
  input[type=text], input[type=number], select {
    width: 100%; background: #1a1a1a; border: 1px solid #444; border-radius: 6px;
    color: #eee; padding: 7px 10px; font-size: 13px; margin-top: 3px;
  }
  input:focus, select:focus { outline: none; border-color: #C9A457; }
  .people-grid { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }
  .person-chip { display: flex; align-items: center; gap: 5px; background: #2a2a2a;
                  border: 1px solid #444; border-radius: 20px; padding: 4px 10px;
                  cursor: pointer; font-size: 12px; transition: all .15s; user-select: none; }
  .person-chip input { width: 12px; height: 12px; cursor: pointer; margin: 0; accent-color: #C9A457; }
  .person-chip.checked { background: #C9A45720; border-color: #C9A457; color: #C9A457; }
  .hint { font-size: 11px; color: #7ab8d4; background: #7ab8d415; padding: 6px 10px;
           border-radius: 6px; border: 1px solid #7ab8d430; line-height: 1.4; }
  .actions { padding: 20px 32px; display: flex; gap: 12px; justify-content: flex-end;
              position: sticky; bottom: 0; background: #1a1a1a; border-top: 1px solid #333; }
  .btn { padding: 10px 24px; border-radius: 8px; border: none; font-size: 14px;
          font-weight: 600; cursor: pointer; transition: opacity .15s; }
  .btn:hover { opacity: .85; }
  .btn-primary { background: #C9A457; color: #111; }
  .btn-secondary { background: #333; color: #eee; }
  .export-panel { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.9);
                   z-index: 100; padding: 32px; overflow-y: auto; flex-direction: column; gap: 16px; }
  .export-panel.open { display: flex; }
  .export-panel h2 { color: #C9A457; }
  .export-panel pre { background: #111; border: 1px solid #333; border-radius: 8px;
                       padding: 20px; font-size: 11px; overflow: auto;
                       color: #7ab8d4; max-height: 55vh; white-space: pre-wrap; word-break: break-all; }
  .close-btn { align-self: flex-end; background: #444; color: #eee; border: none;
                padding: 8px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; }
  .export-actions { display: flex; gap: 12px; }
</style>
</head>
<body>

<header>
  <div>
    <h1>📷 Abad Family — Photo Review</h1>
    <p>All 26 photos are digitized physical prints. Set the year, tag people, then export.</p>
  </div>
  <span class="progress" id="progress-text">0 / 26 tagged</span>
</header>

<div class="grid" id="photo-grid"></div>

<div class="actions">
  <button class="btn btn-secondary" onclick="saveProgress()">💾 Save Progress</button>
  <button class="btn btn-primary" onclick="showExport()">Export to data.js →</button>
</div>

<div class="export-panel" id="export-panel">
  <button class="close-btn" onclick="document.getElementById('export-panel').classList.remove('open')">✕ Close</button>
  <h2>Copy these photo entries into your data.js memories</h2>
  <pre id="export-output">Loading...</pre>
  <div class="export-actions">
    <button class="btn btn-primary" onclick="copyExport()">Copy to Clipboard</button>
    <button class="btn btn-secondary" onclick="downloadJSON()">Download intake.json</button>
  </div>
</div>

<script>
const PEOPLE = [{"id": "jose", "name": "Jose Maria Abad"}, {"id": "liz", "name": "Liz Welch"}, {"id": "kevinb", "name": "Kevin B. Duggan"}, {"id": "elizabeth", "name": "Elizabeth Abad"}, {"id": "teresa", "name": "Teresa Abad"}, {"id": "arturo", "name": "Arturo Levenfeld"}, {"id": "gustavo", "name": "Gustavo Levenfeld"}, {"id": "diego", "name": "Diego Levenfeld"}, {"id": "kevinjose", "name": "Kevin J. Duggan"}, {"id": "john", "name": "John Duggan"}];
const PHOTOS = [{"id": "1FNKbt0U3ytGgrIx_KvVD6akvNUlIyLjb", "filename": "IMG_6028.HEIC", "date_type": "digitized_physical", "digitized_date": "2026-06-25", "original_year": null, "needs_review": true, "thumb_url": "https://drive.google.com/thumbnail?id=1FNKbt0U3ytGgrIx_KvVD6akvNUlIyLjb&sz=w800", "folder_hint": "ABAD FAMILY"}, {"id": "1o5ZhvnB_ZtHXw6Q-vWmByyRO8IVhPzr6", "filename": "IMG_6029.heic", "date_type": "digitized_physical", "digitized_date": "2026-06-25", "original_year": null, "needs_review": true, "thumb_url": "https://drive.google.com/thumbnail?id=1o5ZhvnB_ZtHXw6Q-vWmByyRO8IVhPzr6&sz=w800", "folder_hint": "ABAD FAMILY"}, {"id": "1tQDVv8TXNhw0h3YmB12v_dmnoBHoqK8Q", "filename": "IMG_6031.HEIC", "date_type": "digitized_physical", "digitized_date": "2026-06-25", "original_year": null, "needs_review": true, "thumb_url": "https://drive.google.com/thumbnail?id=1tQDVv8TXNhw0h3YmB12v_dmnoBHoqK8Q&sz=w800", "folder_hint": "ABAD FAMILY"}, {"id": "1BFWSOse4pY1jjdCJzFtAvWmr3fK8GzEx", "filename": "IMG_6032.HEIC", "date_type": "digitized_physical", "digitized_date": "2026-06-25", "original_year": null, "needs_review": true, "thumb_url": "https://drive.google.com/thumbnail?id=1BFWSOse4pY1jjdCJzFtAvWmr3fK8GzEx&sz=w800", "folder_hint": "ABAD FAMILY"}, {"id": "1L1UfKGUk3vltyvMzua9xWrTpNZDXBvTW", "filename": "IMG_6033.HEIC", "date_type": "digitized_physical", "digitized_date": "2026-06-25", "original_year": null, "needs_review": true, "thumb_url": "https://drive.google.com/thumbnail?id=1L1UfKGUk3vltyvMzua9xWrTpNZDXBvTW&sz=w800", "folder_hint": "ABAD FAMILY"}, {"id": "1uUAKa971XBSzR2cbdcYXqo87woXUHq1g", "filename": "IMG_6034.HEIC", "date_type": "digitized_physical", "digitized_date": "2026-06-25", "original_year": null, "needs_review": true, "thumb_url": "https://drive.google.com/thumbnail?id=1uUAKa971XBSzR2cbdcYXqo87woXUHq1g&sz=w800", "folder_hint": "ABAD FAMILY"}, {"id": "10YD_EC75UkhSHZYbx7780tSeScJXbXYj", "filename": "IMG_6035.HEIC", "date_type": "digitized_physical", "digitized_date": "2026-06-25", "original_year": null, "needs_review": true, "thumb_url": "https://drive.google.com/thumbnail?id=10YD_EC75UkhSHZYbx7780tSeScJXbXYj&sz=w800", "folder_hint": "ABAD FAMILY"}, {"id": "1EM51440S89VxIDFj8sAjxOGLcCslNcz5", "filename": "IMG_6036.HEIC", "date_type": "digitized_physical", "digitized_date": "2026-06-25", "original_year": null, "needs_review": true, "thumb_url": "https://drive.google.com/thumbnail?id=1EM51440S89VxIDFj8sAjxOGLcCslNcz5&sz=w800", "folder_hint": "ABAD FAMILY"}, {"id": "1OQ7xdhF5gPeybs4XshHDWxnUdc1HdqJf", "filename": "IMG_6037.HEIC", "date_type": "digitized_physical", "digitized_date": "2026-06-25", "original_year": null, "needs_review": true, "thumb_url": "https://drive.google.com/thumbnail?id=1OQ7xdhF5gPeybs4XshHDWxnUdc1HdqJf&sz=w800", "folder_hint": "ABAD FAMILY"}, {"id": "1xrOQSCuUYa1vMe8iylVncZwSMSfjk8vE", "filename": "IMG_6038.HEIC", "date_type": "digitized_physical", "digitized_date": "2026-06-25", "original_year": null, "needs_review": true, "thumb_url": "https://drive.google.com/thumbnail?id=1xrOQSCuUYa1vMe8iylVncZwSMSfjk8vE&sz=w800", "folder_hint": "ABAD FAMILY"}, {"id": "1dUv6gtDhFk1-BGaFYhgG9uXCKFFrOMWP", "filename": "IMG_6039.HEIC", "date_type": "digitized_physical", "digitized_date": "2026-06-25", "original_year": null, "needs_review": true, "thumb_url": "https://drive.google.com/thumbnail?id=1dUv6gtDhFk1-BGaFYhgG9uXCKFFrOMWP&sz=w800", "folder_hint": "ABAD FAMILY"}, {"id": "1iyG1FLlvA8ThpezXyCc1NAVncwFxYrX6", "filename": "IMG_6040.HEIC", "date_type": "digitized_physical", "digitized_date": "2026-06-25", "original_year": null, "needs_review": true, "thumb_url": "https://drive.google.com/thumbnail?id=1iyG1FLlvA8ThpezXyCc1NAVncwFxYrX6&sz=w800", "folder_hint": "ABAD FAMILY"}, {"id": "1im8jLZYSkFaD4dEAv2s8u7d0cA-E1rua", "filename": "IMG_6041.HEIC", "date_type": "digitized_physical", "digitized_date": "2026-06-25", "original_year": null, "needs_review": true, "thumb_url": "https://drive.google.com/thumbnail?id=1im8jLZYSkFaD4dEAv2s8u7d0cA-E1rua&sz=w800", "folder_hint": "ABAD FAMILY"}, {"id": "1HYqNMdnRvSFyBh3URXx7QGQKv2AWWze1", "filename": "IMG_6042.HEIC", "date_type": "digitized_physical", "digitized_date": "2026-06-25", "original_year": null, "needs_review": true, "thumb_url": "https://drive.google.com/thumbnail?id=1HYqNMdnRvSFyBh3URXx7QGQKv2AWWze1&sz=w800", "folder_hint": "ABAD FAMILY"}, {"id": "1Ht6xnrilbeJsabBYOMIYx2sP243JL17J", "filename": "IMG_6043.HEIC", "date_type": "digitized_physical", "digitized_date": "2026-06-25", "original_year": null, "needs_review": true, "thumb_url": "https://drive.google.com/thumbnail?id=1Ht6xnrilbeJsabBYOMIYx2sP243JL17J&sz=w800", "folder_hint": "ABAD FAMILY"}, {"id": "1qz1LSQR_j4mhBkdj-yG6HbUiQiCK0xPh", "filename": "IMG_6044.HEIC", "date_type": "digitized_physical", "digitized_date": "2026-06-25", "original_year": null, "needs_review": true, "thumb_url": "https://drive.google.com/thumbnail?id=1qz1LSQR_j4mhBkdj-yG6HbUiQiCK0xPh&sz=w800", "folder_hint": "ABAD FAMILY"}, {"id": "1DCSEXLksBN_fsE4QhMYpbWUkEAt2cdgD", "filename": "IMG_6045.HEIC", "date_type": "digitized_physical", "digitized_date": "2026-06-25", "original_year": null, "needs_review": true, "thumb_url": "https://drive.google.com/thumbnail?id=1DCSEXLksBN_fsE4QhMYpbWUkEAt2cdgD&sz=w800", "folder_hint": "ABAD FAMILY"}, {"id": "1mXr06ulv_52eyHWL17QEwYZoe7NdHQVs", "filename": "IMG_6046.HEIC", "date_type": "digitized_physical", "digitized_date": "2026-06-25", "original_year": null, "needs_review": true, "thumb_url": "https://drive.google.com/thumbnail?id=1mXr06ulv_52eyHWL17QEwYZoe7NdHQVs&sz=w800", "folder_hint": "ABAD FAMILY"}, {"id": "16guq3s3u2urAQabK9LDqXpXdI9wRlbMD", "filename": "IMG_6047.HEIC", "date_type": "digitized_physical", "digitized_date": "2026-06-25", "original_year": null, "needs_review": true, "thumb_url": "https://drive.google.com/thumbnail?id=16guq3s3u2urAQabK9LDqXpXdI9wRlbMD&sz=w800", "folder_hint": "ABAD FAMILY"}, {"id": "1JPAUWy1WJ8RRNEwxXKy_DxcGHfj_7_KP", "filename": "IMG_6048.HEIC", "date_type": "digitized_physical", "digitized_date": "2026-06-25", "original_year": null, "needs_review": true, "thumb_url": "https://drive.google.com/thumbnail?id=1JPAUWy1WJ8RRNEwxXKy_DxcGHfj_7_KP&sz=w800", "folder_hint": "ABAD FAMILY"}, {"id": "1BClgTjp2z2XUneAzBKMw1VcbVUAuH5LH", "filename": "IMG_6049.HEIC", "date_type": "digitized_physical", "digitized_date": "2026-06-25", "original_year": null, "needs_review": true, "thumb_url": "https://drive.google.com/thumbnail?id=1BClgTjp2z2XUneAzBKMw1VcbVUAuH5LH&sz=w800", "folder_hint": "ABAD FAMILY"}, {"id": "1DvP7BYOiHWFcpqR9jhOadP-3stsH6Ku6", "filename": "IMG_6050.HEIC", "date_type": "digitized_physical", "digitized_date": "2026-06-25", "original_year": null, "needs_review": true, "thumb_url": "https://drive.google.com/thumbnail?id=1DvP7BYOiHWFcpqR9jhOadP-3stsH6Ku6&sz=w800", "folder_hint": "ABAD FAMILY"}, {"id": "11QGXXhmQogLEWPoI2VXuS3bnxrxba8T5", "filename": "IMG_6051.HEIC", "date_type": "digitized_physical", "digitized_date": "2026-06-25", "original_year": null, "needs_review": true, "thumb_url": "https://drive.google.com/thumbnail?id=11QGXXhmQogLEWPoI2VXuS3bnxrxba8T5&sz=w800", "folder_hint": "ABAD FAMILY"}, {"id": "1OmIbTyJmrbZgEHNv6gU9dMVsZTyTRM3h", "filename": "IMG_6052.HEIC", "date_type": "digitized_physical", "digitized_date": "2026-06-25", "original_year": null, "needs_review": true, "thumb_url": "https://drive.google.com/thumbnail?id=1OmIbTyJmrbZgEHNv6gU9dMVsZTyTRM3h&sz=w800", "folder_hint": "ABAD FAMILY"}, {"id": "1eqbKhaHOefI24CgA4RVxiK_LTZyO9dgs", "filename": "IMG_6055.HEIC", "date_type": "digitized_physical", "digitized_date": "2026-06-25", "original_year": null, "needs_review": true, "thumb_url": "https://drive.google.com/thumbnail?id=1eqbKhaHOefI24CgA4RVxiK_LTZyO9dgs&sz=w800", "folder_hint": "ABAD FAMILY"}, {"id": "1ccnZtNcUhLfAgJP00zNf-fN6qbWFBPXO", "filename": "IMG_6057.heic", "date_type": "digitized_physical", "digitized_date": "2026-06-25", "original_year": null, "needs_review": true, "thumb_url": "https://drive.google.com/thumbnail?id=1ccnZtNcUhLfAgJP00zNf-fN6qbWFBPXO&sz=w800", "folder_hint": "ABAD FAMILY"}];
let reviews = {};

try {
  const saved = localStorage.getItem('photo_review_abad_family');
  if (saved) reviews = JSON.parse(saved);
} catch(e) {}

function buildGrid() {
  const grid = document.getElementById('photo-grid');
  grid.innerHTML = PHOTOS.map((photo, i) => {
    const r = reviews[photo.id] || {};
    const peopleChips = PEOPLE.map(p => {
      const checked = (r.people || []).includes(p.id);
      return `<label class="person-chip ${checked ? 'checked' : ''}" id="chip-${i}-${p.id}">
        <input type="checkbox" data-photo="${photo.id}" data-pidx="${i}" data-person="${p.id}"
               ${checked ? 'checked' : ''} onchange="onPersonToggle(this, ${i})">
        ${p.name.split(' ')[0]}
      </label>`;
    }).join('');

    return `<div class="card ${(r.year||(r.people&&r.people.length)) ? 'reviewed' : ''}" id="card-${i}">
      <div class="photo">
        <img src="${photo.thumb_url}" alt="${photo.filename}"
             onerror="this.style.display='none';document.getElementById('noimg-${i}').style.display='flex'">
        <div id="noimg-${i}" class="no-img" style="display:none">
          <span style="font-size:32px">🖼️</span>
          <span>Sign into Google Drive to view</span>
          <a href="https://drive.google.com/file/d/${photo.id}/view" target="_blank"
             style="color:#C9A457;font-size:12px">Open in Drive ↗</a>
        </div>
        <span class="photo-badge">📸 Physical print</span>
        <span class="photo-num">#${i+1} · ${photo.filename}</span>
      </div>
      <div class="form">
        <div class="hint">Shot today (2026-06-25) with your phone — this is a digitized physical print. Fill in the original year below.</div>
        <div>
          <label>Original Year</label>
          <input type="number" id="year-${i}" min="1900" max="2025"
                 value="${r.year || ''}" placeholder="e.g. 1987"
                 oninput="onFieldChange(${i})">
        </div>
        <div>
          <label>Event / Description</label>
          <input type="text" id="event-${i}" value="${r.event || ''}"
                 placeholder="e.g. Christmas, birthday, vacation..."
                 oninput="onFieldChange(${i})">
        </div>
        <div>
          <label>Category</label>
          <select id="cat-${i}" onchange="onFieldChange(${i})">
            ${['holidays','birthdays','weddings','travel','everyday','milestones','reunions']
               .map(c => `<option value="${c}" ${(r.category||'everyday')===c?'selected':''}>
                 ${c.charAt(0).toUpperCase()+c.slice(1)}</option>`).join('')}
          </select>
        </div>
        <div>
          <label>People in this photo</label>
          <div class="people-grid">${peopleChips}</div>
        </div>
      </div>
    </div>`;
  }).join('');
  updateProgress();
}

function onPersonToggle(cb, cardIdx) {
  const photoId = cb.dataset.photo;
  const personId = cb.dataset.person;
  if (!reviews[photoId]) reviews[photoId] = { people: [] };
  if (!reviews[photoId].people) reviews[photoId].people = [];
  const chip = document.getElementById(`chip-${cardIdx}-${personId}`);
  if (cb.checked) {
    if (!reviews[photoId].people.includes(personId)) reviews[photoId].people.push(personId);
    chip.classList.add('checked');
  } else {
    reviews[photoId].people = reviews[photoId].people.filter(p => p !== personId);
    chip.classList.remove('checked');
  }
  updateCard(cardIdx, photoId);
  updateProgress();
  autoSave();
}

function onFieldChange(cardIdx) {
  const photo = PHOTOS[cardIdx];
  if (!reviews[photo.id]) reviews[photo.id] = { people: [] };
  reviews[photo.id].year = parseInt(document.getElementById(`year-${cardIdx}`).value) || null;
  reviews[photo.id].event = document.getElementById(`event-${cardIdx}`).value;
  reviews[photo.id].category = document.getElementById(`cat-${cardIdx}`).value;
  updateCard(cardIdx, photo.id);
  updateProgress();
  autoSave();
}

function updateCard(cardIdx, photoId) {
  const card = document.getElementById(`card-${cardIdx}`);
  const r = reviews[photoId] || {};
  card.classList.toggle('reviewed', !!(r.year || (r.people && r.people.length > 0)));
}

function updateProgress() {
  const reviewed = PHOTOS.filter(p => {
    const r = reviews[p.id] || {};
    return r.year || (r.people && r.people.length > 0);
  }).length;
  document.getElementById('progress-text').textContent = `${reviewed} / ${PHOTOS.length} tagged`;
}

function autoSave() {
  try { localStorage.setItem('photo_review_abad_family', JSON.stringify(reviews)); } catch(e) {}
}

function saveProgress() {
  autoSave();
  alert('Saved! Progress is stored in your browser.');
}

function showExport() {
  const output = PHOTOS.map(photo => {
    const r = reviews[photo.id] || {};
    return {
      drive_id: photo.id,
      filename: photo.filename,
      url: photo.thumb_url,
      year: r.year || null,
      event: r.event || '',
      category: r.category || 'everyday',
      people: r.people || [],
      date_type: 'digitized_physical',
    };
  });

  // Group by event for data.js memories format
  const byEvent = {};
  output.forEach(p => {
    const key = p.event || 'uncategorized';
    if (!byEvent[key]) byEvent[key] = [];
    byEvent[key].push(p);
  });

  let snippet = '// ── Photo entries from intake review ──────────────────\n';
  Object.entries(byEvent).forEach(([event, photos]) => {
    snippet += `\n// === ${event} (${photos[0]?.year || 'year unknown'}) ===\n`;
    snippet += `photos: [\n`;
    photos.forEach(p => {
      snippet += `  { url: '${p.url}', caption: '${p.event}', year: ${p.year || 'null'} },  // ${p.filename} — people: ${JSON.stringify(p.people)}\n`;
    });
    snippet += `],\n`;
  });

  document.getElementById('export-output').textContent = snippet;
  document.getElementById('export-panel').classList.add('open');
}

function copyExport() {
  navigator.clipboard.writeText(document.getElementById('export-output').textContent)
    .then(() => alert('Copied to clipboard!'))
    .catch(() => alert('Select all text in the box and copy manually'));
}

function downloadJSON() {
  const output = PHOTOS.map(photo => {
    const r = reviews[photo.id] || {};
    return { drive_id: photo.id, filename: photo.filename, url: photo.thumb_url,
              year: r.year || null, event: r.event || '', category: r.category || 'everyday',
              people: r.people || [], date_type: 'digitized_physical' };
  });
  const blob = new Blob([JSON.stringify(output, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'intake.json';
  a.click();
}

buildGrid();
</script>
</body>
</html>
